server:
  port: 8084
  tomcat:
    max-http-form-post-size: 26214400  # 25MB in bytes

spring:
  application:
    name: blog_service
  datasource:
    # TODO: Please replace this URL with your new NeonDB connection string
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://ep-shiny-violet-a1soua7r-pooler.ap-southeast-1.aws.neon.tech:5432/material_db?sslmode=require}
    username: ${SPRING_DATASOURCE_USERNAME:neondb_owner}
    password: ${SPRING_DATASOURCE_PASSWORD:npg_kFcsqpABNu18}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 30000
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  servlet:
