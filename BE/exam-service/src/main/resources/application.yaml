server:
  port: 8084
  compression:
    enabled: true
    mime-types: application/json,text/plain,text/html
    min-response-size: 1024

spring:
  application:
    name: exam-service

  datasource:
    url: jdbc:postgresql://ep-polished-forest-aouitx9x-pooler.c-2.ap-southeast-1.aws.neon.tech/exam_db?user=neondb_owner&password=npg_HO0ExMqpRa1y&sslmode=require&channelBinding=require
    username: ${DB_USERNAME:neondb_owner}
    password: ${DB_PASSWORD:npg_HO0ExMqpRa1y}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 8000
      idle-timeout: 300000
      max-lifetime: 900000
      keepalive-time: 60000

  jpa:
