server:
  port: 8084
  compression:
    enabled: true
    mime-types: application/json,text/plain,text/html
    min-response-size: 1024

spring:
  application:
    name: exam-service

  datasource:
    url: jdbc:postgresql://ep-shiny-violet-a1soua7r-pooler.ap-southeast-1.aws.neon.tech/exam_db?sslmode=require&channelBinding=require
    username: ${DB_USERNAME:neondb_owner}
    password: ${DB_PASSWORD:npg_kFcsqpABNu18}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 600000
      keepalive-time: 60000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true

  cache:
    type: none

