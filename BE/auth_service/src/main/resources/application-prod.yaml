# Profile prod — tất cả secret phải được cung cấp qua biến môi trường
# Chạy với: SPRING_PROFILES_ACTIVE=prod
#
# Biến môi trường bắt buộc:
#   DB_URL        jdbc:postgresql://<host>:<port>/<db>?sslmode=require
#   DB_USERNAME   <database user>
#   DB_PASSWORD   <database password>
#   JWT_SECRET    <chuỗi ngẫu nhiên >= 32 ký tự>
#   EUREKA_URL    http://<discovery-host>:8761/eureka/   (nếu khác default)

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

jwt:
  secret: ${JWT_SECRET}

management:
  endpoint:
    health:
      show-details: when-authorized
