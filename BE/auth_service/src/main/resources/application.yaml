server:
  port: 8081
  compression:
    enabled: true
    mime-types: application/json,text/plain,text/html
    min-response-size: 1024

spring:
  application:
    name: auth-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 8000
      idle-timeout: 300000
      max-lifetime: 900000
      keepalive-time: 60000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  expiration: 900000        # 15 phút
  refresh-expiration: 2592000000  # 30 ngày

cookie:
  secure: ${COOKIE_SECURE:false}

feign:
  client:
    config:
      default:
        connectTimeout: 2000
        readTimeout: 5000
  httpclient:
    hc5:
      enabled: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://discovery-server:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
