version: '3.8'

services:
  # 1. Discovery Server (Eureka)
  discovery_server:
    build:
      context: .
      dockerfile: discovery_server/Dockerfile
    container_name: discovery-server
    ports:
      - "8761:8761"
    networks:
      - be-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # 2. API Gateway
  api_gateway:
    build:
      context: .
      dockerfile: api_gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      discovery_server:
        condition: service_healthy
    networks:
      - be-network
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - SPRING_PROFILES_ACTIVE=prod
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - JWT_SECRET=${JWT_SECRET}

  # 3. Auth Service
  auth_service:
    build:
      context: .
      dockerfile: auth_service/Dockerfile
    container_name: auth-service
    ports:
      - "8081:8081"
    depends_on:
      discovery_server:
        condition: service_healthy
    networks:
      - be-network
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - SPRING_PROFILES_ACTIVE=prod
      - JWT_SECRET=${JWT_SECRET}
      - COOKIE_SECURE=true
      - DB_URL=${AUTH_DB_URL}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}

  # 4. User Service
  user_service:
    build:
      context: .
      dockerfile: user_service/Dockerfile
    container_name: user-service
    ports:
      - "8082:8082"
    depends_on:
      discovery_server:
        condition: service_healthy
    networks:
      - be-network
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - JWT_SECRET=${JWT_SECRET}
      - SPRING_DATASOURCE_URL=${USER_DB_URL}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}

  # 5. Exam Service
  exam-service:
    build:
      context: .
      dockerfile: exam-service/Dockerfile
    container_name: exam-service
    ports:
      - "8084:8084"
    depends_on:
      discovery_server:
        condition: service_healthy
    networks:
      - be-network
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - JWT_SECRET=${JWT_SECRET}
      - SPRING_DATASOURCE_URL=${EXAM_DB_URL}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}

  # 6. Material Service
  material_service:
    build:
      context: .
      dockerfile: material_service/Dockerfile
    container_name: material-service
    ports:
      - "8083:8083"
    depends_on:
      discovery_server:
        condition: service_healthy
    networks:
      - be-network
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - SPRING_DATASOURCE_URL=${MATERIAL_DB_URL}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - FILE_BASE_PATH=/app

networks:
  be-network:
    driver: bridge