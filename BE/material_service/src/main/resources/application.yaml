server:
  port: 8083
  compression:
    enabled: true
    mime-types: application/json,text/plain,text/html
    min-response-size: 1024

file:
  base-path: ${FILE_BASE_PATH:.}

spring:
  sql:
    init:
      mode: never
  application:
    name: material-service
  datasource:
    url: jdbc:postgresql://ep-polished-forest-aouitx9x-pooler.c-2.ap-southeast-1.aws.neon.tech/material_db?user=neondb_owner&password=npg_HO0ExMqpRa1y&sslmode=require&channelBinding=require
    username: neondb_owner
    password: npg_HO0ExMqpRa1y
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 8000
      idle-timeout: 300000
      max-lifetime: 900000
      keepalive-time: 60000
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
