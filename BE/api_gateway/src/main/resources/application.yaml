server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth_service
              uri: lb://auth-service
              predicates:
                - Path=/api/auth/**

            - id: user_service
              uri: lb://user-service
              predicates:
                - Path=/api/users/**

            - id: exam_service
              uri: lb://exam-service
              predicates:
                - Path=/api/exams/**, /api/categories/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka