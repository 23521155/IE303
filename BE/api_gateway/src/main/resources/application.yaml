server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth_service
              uri: lb://auth-service
              predicates:
                - Path=/api/auth/**

            - id: user_service
              uri: lb://user-service
              predicates:
                - Path=/api/users/**

            - id: exam_service
              uri: lb://exam-service
              predicates:
                - Path=/api/exams/**, /api/categories/**, /api/attempts/**

            - id: material_service
              uri: lb://material-service
              predicates:
                - Path=/api/materials/**
          globalcors:
            corsConfigurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:3000"
                  - "https://itshiken.io.vn"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/