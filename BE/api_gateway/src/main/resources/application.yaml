server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth_service
              uri: lb://auth-service
              predicates:
                - Path=/api/auth/**

            - id: user_service
              uri: lb://user-service
              predicates:
                - Path=/api/users/**

            - id: material_service
              uri: lb://material_service
              predicates:
                - Path=/api/materials/**

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/